<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpio-N: The Journey</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Unified CDN Versions to Prevent Crashes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <main>
        <!-- Added 'visible' class so text displays instantly while 3D loads -->
        <section class="scroll-section" id="intro">
            <div class="content visible">
                <h1>The Scorpio-N</h1>
                <p>Scroll down to unlock the next chapter.</p>
            </div>
        </section>

        <section class="scroll-section" id="gate-open">
            <div class="content visible">
                <h2>Unleash the Beast</h2>
                <p>The gates open up to a brand new dimension of power.</p>
            </div>
        </section>

        <section class="scroll-section" id="corridor-drive">
            <div class="content visible">
                <h2>Navigate the Unknown</h2>
                <p>Cruising seamlessly through structural engineering masterclasses.</p>
            </div>
        </section>

        <section class="scroll-section" id="final-view">
            <div class="content visible">
                <h2>The Ultimate SUV</h2>
                <p>Commanding presence, wherever it stands.</p>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
